<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>F-0310 HUB</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #000; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; color: #fff; }
        .card { background: #1c1c1e; border-radius: 40px; padding: 35px; width: 270px; text-align: center; border: 1px solid #333; box-shadow: 0 15px 50px rgba(0,0,0,0.8); }
        
        /* CSS ILE ÇIZILEN EFSANE "F" LOGOSU */
        .logo-box { position: relative; width: 110px; height: 110px; margin: 0 auto 25px; background: linear-gradient(135deg, #007AFF, #0056b3); border-radius: 26px; border: 3px solid #fff; display: flex; align-items: center; justify-content: center; transform: rotate(-6deg); box-shadow: 0 0 20px rgba(0,122,255,0.4); }
        .logo-box span { font-size: 80px; font-weight: 900; font-family: 'Arial Black', sans-serif; letter-spacing: -5px; }
        .mini-icon { width: 35px; height: 35px; border-radius: 10px; position: absolute; bottom: -8px; right: -8px; border: 2px solid #fff; background: white; object-fit: cover; }
        
        h2 { margin: 0; font-size: 24px; font-weight: 800; }
        .cert-info { color: #8e8e93; font-size: 11px; margin: 5px 0 25px 0; text-transform: uppercase; font-weight: 600; }
        
        .btn-install { display: block; background: #007AFF; color: #fff; padding: 18px; border-radius: 20px; text-decoration: none; font-weight: 700; font-size: 16px; margin-bottom: 15px; box-shadow: 0 5px 15px rgba(0,122,255,0.3); transition: 0.2s; }
        .btn-install:active { transform: scale(0.95); opacity: 0.8; }
        
        .dns-btn { display: block; color: #636366; text-decoration: none; font-size: 13px; border-top: 1px solid #333; padding-top: 15px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo-box">
            <span>F</span>
            <img src="icon.jpg" class="mini-icon" alt="ESign">
        </div>
        <h2>F-0310 HUB</h2>
        <div class="cert-info">National Oilwell Varco, Inc.</div>
        
        <a href="itms-services://?action=download-manifest&url=https://fake0310.github.io/F-0310-Hub/manifest.plist" class="btn-install">ESign YÜKLE</a>
        
        <a href="F-0310Hub.mobileconfig" class="dns-btn">Sistemi Koru (DNS)</a>
    </div>
</body>
</html>
