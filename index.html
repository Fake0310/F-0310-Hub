
<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>F-0310 Hub</title>
    <style>
        :root { --main-blue: #007AFF; --bg: #f2f2f7; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); margin: 0; padding: 20px; color: #000; -webkit-tap-highlight-color: transparent; }
        
        .header { margin: 30px 0 20px 10px; }
        .header h1 { font-size: 34px; font-weight: 800; margin: 0; letter-spacing: -1px; }
        .header p { color: #8e8e93; text-transform: uppercase; font-size: 13px; font-weight: 600; margin: 0; }

        .app-card { background: #fff; border-radius: 20px; padding: 16px; display: flex; align-items: center; box-shadow: 0 1px 2px rgba(0,0,0,0.05); margin-bottom: 25px; }
        
        .app-icon { width: 72px; height: 72px; border-radius: 16px; overflow: hidden; margin-right: 15px; border: 0.5px solid #d1d1d6; flex-shrink: 0; }
        .app-icon img { width: 100%; height: 100%; object-fit: cover; }
        
        .app-details { flex-grow: 1; }
        .app-details h3 { margin: 0; font-size: 19px; font-weight: 700; letter-spacing: -0.5px; }
        .app-details p { margin: 2px 0 8px 0; font-size: 12px; color: #8e8e93; font-weight: 400; }

        .btn-get { display: inline-block; background: #f0f0f7; color: var(--main-blue); padding: 6px 22px; border-radius: 20px; text-decoration: none; font-weight: 800; font-size: 15px; transition: 0.2s; }
        .btn-get:active { background: #d1d1d6; }

        .footer-card { background: #fff; border-radius: 20px; padding: 20px; border-radius: 20px; }
        .btn-dns { display: block; background: var(--main-blue); color: #fff; text-align: center; padding: 14px; border-radius: 12px; text-decoration: none; font-weight: 600; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="header">
        <p id="dateText"></p>
        <h1>F-0310 Hub</h1>
    </div>

    <div class="app-card">
        <div class="app-icon">
            <img src="img/icon.jpg" alt="ESign">
        </div>
        <div class="app-details">
            <h3>ESign Premium</h3>
            <p>National Oilwell Varco, Inc.</p>
            <a href="itms-services://?action=download-manifest&url=https://f0310.github.io/manifests/manifest.plist" class="btn-get">YÜKLE</a>
        </div>
    </div>

    <div class="footer-card">
        <h4 style="margin:0 0 10px 0; color:var(--main-blue); font-size:18px;">Sistem Koruması</h4>
        <p style="font-size: 13px; color: #636366; line-height: 1.4; margin: 0;">Revoke (İptal) sorunlarını engellemek için DNS profilini mutlaka yükleyin.</p>
        <a href="F-0310Hub.mobileconfig" class="btn-dns">DNS Kalkanını Yükle</a>
    </div>

    <script>
        const d = new Date();
        const options = { weekday: 'long', month: 'long', day: 'numeric' };
        document.getElementById("dateText").innerHTML = d.toLocaleDateString('tr-TR', options);
    </script>

</body>
</html>
