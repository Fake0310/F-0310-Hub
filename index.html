<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>F-0310 Hub</title>
    <style>
        :root {
            --primary-color: #00c3ff;
            --bg-color: #0a0a0c;
            --card-bg: #16161a;
            --text-color: #ffffff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            min-height: 100vh;
        }

        /* Kodla çizilen modern logo */
        .css-logo {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #00c3ff, #0066ff);
            border-radius: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            font-weight: 900;
            color: white;
            box-shadow: 0 0 30px rgba(0, 195, 255, 0.5);
            border: 2px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 20px;
        }

        h1 {
            font-size: 26px;
            margin-bottom: 30px;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: 800;
            color: #fff;
        }

        .container {
            width: 100%;
            max-width: 400px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 30px;
            text-align: center;
            border: 1px solid #2d2d33;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }

        /* Burası senin istediğin başlık alanı */
        .card h3 {
            margin: 0 0 15px 0;
            color: var(--primary-color);
            font-size: 22px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .card p {
            font-size: 15px;
            color: #a0a0a5;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .btn {
            display: inline-block;
            width: 100%;
            padding: 18px 0;
            border-radius: 16px;
            text-decoration: none;
            font-weight: bold;
            color: white;
            background: linear-gradient(135deg, #00c3ff, #0066ff);
            transition: all 0.3s ease;
            box-sizing: border-box;
            box-shadow: 0 8px 20px rgba(0, 195, 255, 0.3);
            font-size: 16px;
        }

        .btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <div class="css-logo">F</div>

    <h1>F-0310 HUB</h1>

    <div class="container">
        <div class="card">
            <h3>F-0310 ANTI-REVOKE</h3>
            <p>Uygulamaların kapanmasını (Revoke) önlemek ve sertifika güvenliğini sağlamak için koruma profilini hemen yükleyin.</p>
            <a href="F-0310Hub.mobileconfig" class="btn">KORUMAYI AKTİF ET</a>
        </div>
    </div>

</body>
</html>
