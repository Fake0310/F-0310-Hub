<!DOCTYPE html>
<html lang="tr">
<head>

    <style>
        body { font-family: -apple-system, sans-serif; background: #000; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; color: #fff; }
        .card { background: #1c1c1e; border-radius: 40px; padding: 35px; width: 280px; text-align: center; border: 1px solid #333; box-shadow: 0 15px 50px rgba(0,0,0,0.8); }
        
        /* CSS ILE ÇIZILEN "F" LOGOSU */
        .logo-box { position: relative; width: 110px; height: 110px; margin: 0 auto 25px; background: linear-gradient(135deg, #007AFF, #0056b3); border-radius: 26px; border: 3px solid #fff; display: flex; align-items: center; justify-content: center; transform: rotate(-6deg); box-shadow: 0 0 20px rgba(0,122,255,0.4); }
        .logo-box span { font-size: 80px; font-weight: 900; font-family: 'Arial Black', sans-serif; letter-spacing: -5px; }

        .mini-icon { width: 42px; height: 42px; border-radius: 12px; position: absolute; bottom: -10px; right: -10px; border: 2.5px solid #fff; background: white; object-fit: cover; }
        
        h2 { margin: 0; font-size: 24px; font-weight: 800; }

        .btn-main:active { transform: scale(0.95); }
        
        /* Alttaki Yeni Belirgin Profil Butonu */
        .btn-alt { display: block; background: transparent; color: #fff; padding: 12px; border-radius: 15px; text-decoration: none; font-weight: 600; font-size: 13px; border: 1px solid #007AFF; transition: 0.2s; background: rgba(0, 122, 255, 0.1); }
        .btn-alt:active { background: rgba(0, 122, 255, 0.3); }
        
        .divider { border-top: 1px solid #333; margin: 20px 0; position: relative; }
    </style>
</head>
