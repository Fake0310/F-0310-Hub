<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>F-0310 Hub</title>
    <style>
        :root {
            --primary-color: #00c3ff;
            --bg-color: #0a0a0c;
            --card-bg: #16161a;
            --text-color: #ffffff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            min-height: 100vh;
        }

        /* Logo Ayarları */
        .logo {
            width: 150px;
            height: 150px;
            border-radius: 30px;
            border: 3px solid var(--primary-color);
            box-shadow: 0 0 20px rgba(0, 195, 255, 0.4);
            object-fit: cover;
            margin-bottom: 20px;
            background-color: #1a1a1d;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 30px;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: bold;
        }

        .container {
            width: 100%;
            max-width: 400px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 20px;
            text-align: center;
            border: 1px solid #2d2d33;
        }

        .card h3 {
            margin: 0 0 10px 0;
            color: var(--primary-color);
        }

        .card p {
            font-size: 14px;
            color: #a0a0a5;
            margin-bottom: 25px;
            line-height: 1.4;
        }

        .btn {
            display: inline-block;
            width: 100%;
            padding: 16px 0;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
            color: white;
            background: linear-gradient(135deg, #00c3ff, #0066ff);
            transition: transform 0.2s;
            box-sizing: border-box;
            box-shadow: 0 4px 15px rgba(0, 195, 255, 0.3);
        }

        .btn:active {
            transform: scale(0.96);
        }
    </style>
</head>
<body>

    <img src="IMG_0351.png" alt="F-0310" class="logo" onerror="this.src='IMG_0351.PNG';">

    <h1>F-0310 HUB</h1>

    <div class="container">
        
        <div class="card">
            <h3>DNS KALKANI</h3>
            <p>Sistemi korumaya almak ve iptalleri durdurmak için DNS profilini yükleyin.</p>
            <a href="F-0310Hub.mobileconfig" class="btn">KALKANI YÜKLE</a>
        </div>

    </div>

</body>
</html>
