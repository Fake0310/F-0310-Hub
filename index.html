<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>F-0310 HUB</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #000; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; color: #fff; }
        .card { background: #1c1c1e; border-radius: 40px; padding: 35px; width: 280px; text-align: center; border: 1px solid #333; box-shadow: 0 15px 50px rgba(0,0,0,0.8); }
        
        .logo-box { position: relative; width: 110px; height: 110px; margin: 0 auto 25px; background: linear-gradient(135deg, #007AFF, #0056b3); border-radius: 26px; border: 3px solid #fff; display: flex; align-items: center; justify-content: center; transform: rotate(-6deg); }
        .logo-box span { font-size: 80px; font-weight: 900; font-family: 'Arial Black', sans-serif; letter-spacing: -5px; }
        
        /* ESign Iconu için kesin ayar */
        .mini-icon { width: 45px; height: 45px; border-radius: 12px; position: absolute; bottom: -12px; right: -12px; border: 2.5px solid #fff; background: #fff; object-fit: cover; z-index: 10; display: block !important; }
        
        h2 { margin: 0; font-size: 24px; font-weight: 800; }
        .cert-info { color: #8e8e93; font-size: 11px; margin: 5px 0 25px 0; text-transform: uppercase; }
        
        /* ANA YÜKLE BUTONU */
        .btn-main { display: block; background: #007AFF; color: #fff; padding: 18px; border-radius: 20px; text-decoration: none; font-weight: 700; font-size: 17px; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,122,255,0.3); }
        
        /* ALTTAKİ ÇOK BELİRGİN DNS BUTONU */
        .btn-alt { display: block; background: #ff4500; color: #fff; padding: 15px; border-radius: 15px; text-decoration: none; font-weight: 800; font-size: 14px; box-shadow: 0 4px 15px rgba(255, 69, 0, 0.4); animation: pulse 2s infinite; }
        
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }
        
        .divider { border-top: 1px solid #333; margin: 20px 0; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo-box">
            <span>F</span>
            <img src="icon.jpg" class="mini-icon">
        </div>
        <h2>F-0310 HUB</h2>
        <div class="cert-info">National Oilwell Varco, Inc.</div>
        
        <a href="itms-services://?action=download-manifest&url=https://fake0310.github.io/F-0310-Hub/manifest.plist" class="btn-main">ESign YÜKLE</a>
        
        <div class="divider"></div>
        
        <a href="F-0310Hub.mobileconfig" class="btn-alt">🛡️ DNS PROFILINI YÜKLE</a>

</html>
